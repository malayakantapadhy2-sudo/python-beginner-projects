<!DOCTYPE html>
<html>
<head>
<title>Simple Calculator</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

.calculator{
    background:#222;
    padding:20px;
    border-radius:10px;
}

input{
    width:220px;
    height:40px;
    margin-bottom:10px;
    font-size:20px;
    text-align:right;
}

button{
    width:50px;
    height:50px;
    margin:5px;
    font-size:18px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.number{
    background:#eee;
}

.operator{
    background:orange;
    color:white;
}

.equal{
    background:green;
    color:white;
}
</style>
</head>

<body>

<div class="calculator">
<input type="text" id="result">

<br>

<button class="number" onclick="result.value+='7'">7</button>
<button class="number" onclick="result.value+='8'">8</button>
<button class="number" onclick="result.value+='9'">9</button>
<button class="operator" onclick="result.value+='/'">/</button>

<br>

<button class="number" onclick="result.value+='4'">4</button>
<button class="number" onclick="result.value+='5'">5</button>
<button class="number" onclick="result.value+='6'">6</button>
<button class="operator" onclick="result.value+='*'">*</button>

<br>

<button class="number" onclick="result.value+='1'">1</button>
<button class="number" onclick="result.value+='2'">2</button>
<button class="number" onclick="result.value+='3'">3</button>
<button class="operator" onclick="result.value+='-'">-</button>

<br>

<button class="number" onclick="result.value+='0'">0</button>
<button onclick="result.value=''">C</button>
<button class="equal" onclick="result.value=eval(result.value)">=</button>
<button class="operator" onclick="result.value+='+'">+</button>

</div>

</body>
</html>
